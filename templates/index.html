<!DOCTYPE html>
<html>
<head>
<title>TikTok Downloader</title>
</head>
<body>

<h2>TikTok Downloader</h2>

<input id="url" placeholder="Paste link">
<button onclick="download('video')">Download Video</button>
<button onclick="download('mp3')">Download MP3</button>

<script>
async function download(mode) {
    const url = document.getElementById("url").value;

    const res = await fetch("/download", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `url=${encodeURIComponent(url)}&mode=${mode}`
    });

    const data = await res.json();

    if (data.file) {
        window.location.href = "/file/" + data.file;
    } else {
        alert(data.error);
    }
}
</script>

</body>
</html>
