<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Downloader</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ff0050, #000);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
}

/* MAIN */
.container {
  max-width: 600px;
  margin: auto;
  text-align: center;
}

/* INPUT */
.input-box {
  display: flex;
  margin-top: 30px;
  border-radius: 12px;
  overflow: hidden;
}

input {
  flex: 1;
  padding: 15px;
  border: none;
  outline: none;
}

button {
  padding: 15px;
  border: none;
  background: #00f2ea;
  font-weight: bold;
  cursor: pointer;
}

/* ADS */
.ad {
  margin: 20px 0;
  height: 90px;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #777;
}

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 40px;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="header">🎬 TikTok Downloader</div>

<div class="container">

  <!-- TOP AD -->
  <div class="ad">Ad Space</div>

  <!-- FORM (IMPORTANT) -->
  <form action="/download" method="post" target="_blank">
    <div class="input-box">
      <input name="url" placeholder="Paste TikTok link here..." required>
      <button type="submit">Download</button>
    </div>
  </form>

  <!-- MIDDLE AD -->
  <div class="ad">Ad Space</div>

</div>

<div class="footer">
Free tool • No login • Works on mobile
</div>

</body>
</html>
