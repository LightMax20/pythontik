<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Downloader</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  max-width: 600px;
  margin: auto;
  text-align: center;
}

/* INPUT BOX */
.input-box {
  display: flex;
  margin-top: 20px;
  border-radius: 10px;
  overflow: hidden;
}

input {
  flex: 1;
  padding: 15px;
  border: none;
  outline: none;
  font-size: 14px;
}

button {
  padding: 15px;
  border: none;
  background: #00f2ea;
  font-weight: bold;
  cursor: pointer;
}

/* LOADER */
.loader {
  display: none;
  margin-top: 20px;
  font-size: 14px;
}

/* ADS */
.ad {
  margin: 20px auto;
  width: 100%;
  height: 90px;
  background: #222;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #888;
}

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 40px;
  font-size: 12px;
  color: #777;
}
</style>

</head>

<body>

<div class="header">🎬 TikTok Downloader</div>

<div class="container">

  <!-- TOP AD -->
  <div class="ad">Ad Space</div>

  <div class="input-box">
    <input id="url" placeholder="Paste TikTok link here...">
    <button onclick="startDownload()">Download</button>
  </div>

  <div class="loader" id="loader">Processing... Please wait</div>

  <!-- MIDDLE AD -->
  <div class="ad">Ad Space</div>

</div>

<div class="footer">
Free tool • No login required
</div>

<script>
function startDownload() {
    const url = document.getElementById("url").value;
    const loader = document.getElementById("loader");

    if (!url) {
        alert("Please enter a TikTok URL");
        return;
    }

    loader.style.display = "block";

    // Redirect to backend (this triggers real download)
    window.location.href = "/download?url=" + encodeURIComponent(url);
}
</script>

</body>
</html>
