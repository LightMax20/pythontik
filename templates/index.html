<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TikTok Downloader Without Watermark - Free & Fast</title>

<!-- SEO -->
<meta name="description" content="Download TikTok videos without watermark in HD or MP3 format. Fast, free, and easy TikTok downloader.">
<meta name="keywords" content="tiktok downloader, download tiktok video, mp3 tiktok, no watermark">
<meta property="og:title" content="TikTok Downloader">
<meta property="og:description" content="Download TikTok videos easily">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 10px;
}

.input-box {
  display: flex;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 20px;
}

input {
  flex: 1;
  padding: 15px;
  border: none;
  outline: none;
}

button {
  padding: 15px;
  border: none;
  background: #00f2ea;
  cursor: pointer;
  font-weight: bold;
}

.preview {
  display: none;
  margin-top: 20px;
  background: #1a1a1a;
  padding: 15px;
  border-radius: 12px;
}

.preview img {
  width: 100%;
  border-radius: 10px;
}

.download-buttons button {
  margin-top: 10px;
  width: 100%;
}

.ad {
  margin: 20px 0;
  height: 90px;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
}

.footer {
  margin-top: 40px;
  text-align: center;
  font-size: 12px;
  color: #aaa;
}
</style>

</head>

<body>

<div class="header">🎬 TikTok Downloader</div>

<div class="container">

  <!-- TOP AD -->
  <div class="ad">Ad Space</div>

  <div class="input-box">
    <input id="url" placeholder="Paste TikTok link here...">
    <button onclick="getPreview()">Search</button>
  </div>

  <!-- PREVIEW -->
  <div class="preview" id="preview">
    <img id="thumb">
    <h3 id="title"></h3>

    <div class="download-buttons">
      <button onclick="download('video')">⬇ Download HD Video</button>
      <button onclick="download('mp3')">🎵 Download MP3</button>
    </div>
  </div>

  <!-- MIDDLE AD -->
  <div class="ad">Ad Space</div>

  <!-- SEO CONTENT -->
  <div style="margin-top:30px;">
    <h2>Download TikTok Videos Without Watermark</h2>
    <p>
      This tool allows you to download TikTok videos without watermark in HD quality or extract MP3 audio easily.
      Fast, free, and mobile-friendly TikTok downloader.
    </p>
  </div>

</div>

<div class="footer">
Free tool • No login • Unlimited downloads
</div>

<script>
let currentUrl = "";

async function getPreview() {
    const url = document.getElementById("url").value;

    if (!url) {
        alert("Enter URL");
        return;
    }

    currentUrl = url;

    const res = await fetch("/preview?url=" + encodeURIComponent(url));
    const data = await res.json();

    if (data.error) {
        alert("Invalid or private video");
        return;
    }

    document.getElementById("thumb").src = data.thumbnail;
    document.getElementById("title").innerText = data.title;
    document.getElementById("preview").style.display = "block";
}

function download(mode) {
    window.location.href = "/download?url=" + encodeURIComponent(currentUrl) + "&mode=" + mode;
}
</script>

</body>
</html>
