<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Downloader</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ff0050, #000);
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 25px;
    }

    .input-box {
      display: flex;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    input {
      flex: 1;
      padding: 15px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      padding: 15px 20px;
      border: none;
      background: #00f2ea;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00cfc7;
    }

    .loader {
      margin-top: 20px;
      display: none;
    }

    .spinner {
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #00f2ea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎬 TikTok Downloader</h1>
  <p>Download videos without watermark (when available)</p>

  <form id="form">
    <div class="input-box">
      <input id="url" name="url" placeholder="Paste TikTok link here..." required>
      <button type="submit">Download</button>
    </div>
  </form>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Processing...</p>
  </div>

  <div class="footer">
    Free tool • No login required
  </div>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
    const loader = document.getElementById("loader");
    loader.style.display = "block";
});
</script>

</body>
</html>
