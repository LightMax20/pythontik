<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Downloader</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
}

/* MAIN BOX */
.container {
  max-width: 600px;
  margin: auto;
  text-align: center;
}

/* INPUT */
.input-box {
  display: flex;
  margin-top: 20px;
  border-radius: 10px;
  overflow: hidden;
}

input {
  flex: 1;
  padding: 15px;
  border: none;
  outline: none;
}

button {
  padding: 15px;
  border: none;
  background: #00f2ea;
  cursor: pointer;
  font-weight: bold;
}

/* LOADER */
.loader {
  display: none;
  margin-top: 20px;
}

/* ADS */
.ad {
  margin: 20px auto;
  width: 100%;
  height: 90px;
  background: #222;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #888;
}

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 40px;
  font-size: 12px;
  color: #777;
}
</style>

</head>

<body>

<div class="header">🎬 TikTok Downloader</div>

<div class="container">

  <!-- TOP AD -->
  <div class="ad">Ad Space</div>

  <div class="input-box">
    <input id="url" placeholder="Paste TikTok link...">
    <button onclick="download()">Download</button>
  </div>

  <div class="loader" id="loader">Processing...</div>

  <!-- MIDDLE AD -->
  <div class="ad">Ad Space</div>

</div>

<div class="footer">
Free tool • No login required
</div>

<script>
async function download() {
  const url = document.getElementById("url").value;
  const loader = document.getElementById("loader");

  if (!url) {
    alert("Enter URL");
    return;
  }

  loader.style.display = "block";

  try {
    const res = await fetch("/download", {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: "url=" + encodeURIComponent(url)
    });

    const blob = await res.blob();

    const a = document.createElement("a");
    a.href = window.URL.createObjectURL(blob);
    a.download = "tiktok_video.mp4";
    a.click();

  } catch (e) {
    alert("Download failed");
  }

  loader.style.display = "none";
}
</script>

</body>
</html>
